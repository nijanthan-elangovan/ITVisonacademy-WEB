name: Deploy to Server

on:
  push:
    branches: [production, staging]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package build artifacts
        run: tar -czf deploy.tar.gz .next public package.json package-lock.json next.config.ts

      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "production" ]; then
            echo "app_name=itvision" >> "$GITHUB_OUTPUT"
            echo "deploy_dir=/home/ubuntu/itvision" >> "$GITHUB_OUTPUT"
          else
            echo "app_name=itvision-staging" >> "$GITHUB_OUTPUT"
            echo "deploy_dir=/home/ubuntu/itvision-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: /home/ubuntu/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ${{ steps.target.outputs.deploy_dir }}
            cd ${{ steps.target.outputs.deploy_dir }}
            tar -xzf /home/ubuntu/deploy.tar.gz
            rm /home/ubuntu/deploy.tar.gz

            npm install --production

            # Check if PM2 app exists, if not start it
            if pm2 describe ${{ steps.target.outputs.app_name }} > /dev/null 2>&1; then
              pm2 restart ${{ steps.target.outputs.app_name }}
            else
              if [ "${{ steps.target.outputs.app_name }}" = "itvision-staging" ]; then
                PORT=3001 pm2 start npm --name ${{ steps.target.outputs.app_name }} -- start
              else
                pm2 start npm --name ${{ steps.target.outputs.app_name }} -- start
              fi
              pm2 save
            fi
